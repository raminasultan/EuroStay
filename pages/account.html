<!DOCTYPE html>

<html>
    <head>
    <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EuroStay</title>
        <link rel="stylesheet" href="../css/account.css">
        <link rel="icon" type="image/png" href="../images/E.png">

    </head>

    <body>
        <header>
            <div class="head">

                <h1>EuroStay</h1>

                <div class="buttons">

                    <a href="../pages/template.html">Home</a>
                    <a href="../pages/compare.html">Compare</a>
                    <a href="../pages/favourite.html">Favourite</a>
                    <a href="../pages/account.html">Account</a>
                    <button class="reglog" onclick="location.href='register.html'">Register</button>
                    <button class="reglog" onclick="location.href='logIN.html'">Log In</button>
                    

                </div>
            </div>
            <div class="text">

            </div>

        </header>

            <div class="profile">
                <div class="avatar"></div>

                </div>
            </div>

            <div class="box">

                <button onclick="location.href='../pages/payment.html'" >Payments</button>

        </div>
        <footer id="footer">

                </div>

        
                <div class="footer-right">
                    <div class="icons">

                    <p>email.com</p>
